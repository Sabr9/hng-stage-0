<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hng-stage-0</title>
    <link rel="stylesheet" href="Stylesheet.css">
</head>
<body>
    <article data-testid="test-todo-card">
        <h2 data-testid="test-todo-title">Build HNG Todo card</h2>
        <p data-testid="test-todo-description">Writing HTML, CSS and JS to complete Stage 0 task</p>
        <div>
            <span data-testid="test-todo-priority">High</span>
            <span data-testid="test-todo-status">Pending</span>
        </div>
        <div class="time-container">
            <time data-testid="test-todo-due-date">Due April 16, 2026</time>
            <p data-testid="test-todo-time-remaining">Due in 5 days</p>
        </div>
        <label>
            <input type="checkbox" data-testid="test-todo-complete-toggle">
            Mark as complete
        </label>
        <ul data-testid="test-todo-tags" style="background: none !important;">
            <li data-testid="test-todo-tag-work">WORK</li>
            <li data-testid="test-todo-tag-urgent">URGENT</li>
        </ul>
        <div class="actions">
            <button data-testid="test-todo-edit-button">Edit</button>
            <button data-testid="test-todo-delete-button">Delete</button>
        </div>
    </article>
     <script src="Script.js"></script>
</body>
</html>
