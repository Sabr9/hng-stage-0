<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 1A - Todo Card</title>
    <link rel="stylesheet" href="assets/css/Stylesheet.css">
</head>
<body>
    <article data-testid="test-todo-card">
        <div id="todo-view-mode">
            <label class="checkbox-container">
                <input type="checkbox" data-testid="test-todo-complete-toggle"> 
                Complete Task
            </label>

            <h2 data-testid="test-todo-title">Build HNG Todo card</h2>
            
            <div data-testid="test-todo-collapsible-section" id="todo-description-container" style="display: none;">
                <p data-testid="test-todo-description">Writing HTML, CSS and JS to complete Stage 0 task</p>
            </div>

            <button data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="todo-description-container">Show More</button>
            
            <div class="meta-info">
                <span data-testid="test-todo-priority-indicator" class="priority-high">High</span>
                <span data-testid="test-todo-status-control">Pending</span>
            </div>
            
            <div class="time-container">
                <p data-testid="test-todo-time-remaining">No date set</p>
                <span data-testid="test-todo-overdue-indicator"></span>
            </div>

            <button id="edit-btn" data-testid="test-todo-edit-button">Edit Task</button>
        </div>

        <form id="todo-edit-mode" data-testid="test-todo-edit-form" style="display: none">
            <label>Title:</label>
            <input type="text" data-testid="test-todo-edit-title-input" id="edit-title" value="Build HNG Todo card">
            
            <label>Description:</label>
            <textarea data-testid="test-todo-edit-description-input" id="edit-desc">Writing HTML, CSS and JS to complete Stage 0 task</textarea>
            
            <label>Priority:</label>
            <select data-testid="test-todo-edit-priority-select" id="edit-priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High" selected>High</option>
            </select>
            
            <label>Due Date:</label>
            <input type="datetime-local" data-testid="test-todo-edit-due-date-input" id="edit-date">
            
            <div class="form-actions">
                <button type="button" data-testid="test-todo-save-button" id="save-btn" class="save-btn">Save</button>
                <button type="button" data-testid="test-todo-cancel-button" id="cancel-btn" class="cancel-btn">Cancel</button>
            </div>
        </form>
    </article>

    <script src="assets/js/Script.js"></script>
</body>
</html>
